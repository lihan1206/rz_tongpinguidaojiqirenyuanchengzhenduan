{{- if .Values.backend.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "robot-diagnosis.fullname" . }}-backend
  labels:
    {{- include "robot-diagnosis.backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "robot-diagnosis.backend.selectorLabels" . | nindent 4 }}
{{- end }}

{{- if .Values.frontend.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "robot-diagnosis.fullname" . }}-frontend
  labels:
    {{- include "robot-diagnosis.frontend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "robot-diagnosis.frontend.selectorLabels" . | nindent 4 }}
{{- end }}

{{- if .Values.javaService.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "robot-diagnosis.fullname" . }}-java-service
  labels:
    {{- include "robot-diagnosis.java.labels" . | nindent 4 }}
spec:
  type: {{ .Values.javaService.service.type }}
  ports:
    - port: {{ .Values.javaService.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 8081
      targetPort: management
      protocol: TCP
      name: management
  selector:
    {{- include "robot-diagnosis.java.selectorLabels" . | nindent 4 }}
{{- end }}
