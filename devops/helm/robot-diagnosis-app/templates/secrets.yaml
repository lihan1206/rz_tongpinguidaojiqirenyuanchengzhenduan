{{- if .Values.externalSecrets.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "robot-diagnosis.fullname" . }}-db-credentials
  labels:
    {{- include "robot-diagnosis.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: db-credentials
    creationPolicy: Owner
  data:
    - secretKey: url
      remoteRef:
        key: robot-diagnosis/{{ .Values.global.environment }}/db-password
        property: url
    - secretKey: username
      remoteRef:
        key: robot-diagnosis/{{ .Values.global.environment }}/db-password
        property: username
    - secretKey: password
      remoteRef:
        key: robot-diagnosis/{{ .Values.global.environment }}/db-password
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "robot-diagnosis.fullname" . }}-redis-credentials
  labels:
    {{- include "robot-diagnosis.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: redis-credentials
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef:
        key: robot-diagnosis/{{ .Values.global.environment }}/redis-auth
        property: host
    - secretKey: password
      remoteRef:
        key: robot-diagnosis/{{ .Values.global.environment }}/redis-auth
        property: password
{{- end }}
