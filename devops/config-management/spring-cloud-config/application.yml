# ==========================================
# Spring Cloud Config Server Configuration
# ==========================================

server:
  port: 8888

spring:
  application:
    name: config-server
  
  profiles:
    active: git
  
  cloud:
    config:
      server:
        git:
          # Git repository for configuration files
          uri: https://github.com/example/robot-diagnosis-config
          username: ${GIT_USERNAME}
          password: ${GIT_PASSWORD}
          
          # Search paths within the repository
          search-paths:
            - '{application}'
            - '{application}/{profile}'
            - 'common'
          
          # Clone on startup
          clone-on-start: true
          
          # Force pull on each request
          force-pull: true
          
          # Refresh rate in seconds
          refresh-rate: 60
          
          # Timeout settings
          timeout: 10
          
          # Skip SSL validation (for self-signed certs)
          skip-ssl-validation: false
        
        # Encrypt/Decrypt settings
        encrypt:
          enabled: true
        
        # Health check
        health:
          repositories:
            robot-diagnosis:
              label: main
              name: robot-diagnosis
              profiles: production

# ==========================================
# Security Configuration
# ==========================================
security:
  basic:
    enabled: true
  user:
    name: ${CONFIG_SERVER_USERNAME:admin}
    password: ${CONFIG_SERVER_PASSWORD:changeme}

# ==========================================
# Management Endpoints
# ==========================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,refresh,env
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized
    env:
      show-values: when_authorized

# ==========================================
# Logging Configuration
# ==========================================
logging:
  level:
    org.springframework.cloud.config: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
