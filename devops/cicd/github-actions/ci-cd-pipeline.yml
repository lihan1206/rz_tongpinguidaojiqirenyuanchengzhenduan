name: CI/CD Pipeline with Security Scanning

on:
  push:
    branches: [main, develop, 'release/*']
    tags: ['v*']
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend
  IMAGE_NAME_JAVA: ${{ github.repository }}/java-service
  AWS_REGION: ap-southeast-1
  EKS_CLUSTER_NAME: robot-diagnosis-cluster

jobs:
  # ==========================================
  # 阶段 1: 代码质量与静态分析
  # ==========================================
  sonarqube-analysis:
    name: SonarQube Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=robot-diagnosis-system
            -Dsonar.projectName="Robot Diagnosis System"
            -Dsonar.sources=backend/app,frontend/src,refactored-java/src/main
            -Dsonar.tests=refactored-java/src/test
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml
            -Dsonar.java.binaries=refactored-java/target/classes
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/target/**

  # ==========================================
  # 阶段 2: SAST 安全扫描
  # ==========================================
  sast-scan:
    name: SAST Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25
            p/ci

      - name: Run Bandit (Python SAST)
        run: |
          pip install bandit
          bandit -r backend/app -f json -o bandit-report.json || true
          bandit -r backend/app -f html -o bandit-report.html || true

      - name: Upload SAST Reports
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: |
            bandit-report.json
            bandit-report.html

  # ==========================================
  # 阶段 3: 依赖安全扫描
  # ==========================================
  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Run Snyk Security Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-results.sarif

      - name: OWASP Dependency-Check (Java)
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'robot-diagnosis-java'
          path: 'refactored-java'
          format: 'ALL'
          args: >
            --enableRetired
            --enableExperimental

      - name: Upload Dependency Check Reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: |
            reports/
            trivy-fs-results.sarif
            snyk-results.sarif

  # ==========================================
  # 阶段 4: 单元测试
  # ==========================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend, java]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Backend Tests
        if: matrix.component == 'backend'
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pytest --cov=app --cov-report=xml --cov-report=html

      - name: Frontend Tests
        if: matrix.component == 'frontend'
        run: |
          cd frontend
          npm ci
          npm run test -- --coverage --watchAll=false

      - name: Java Tests
        if: matrix.component == 'java'
        run: |
          cd refactored-java
          mvn clean test
          mvn jacoco:report

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.component }}
          path: |
            backend/coverage.xml
            backend/htmlcov/
            frontend/coverage/
            refactored-java/target/site/jacoco/

  # ==========================================
  # 阶段 5: 构建 Docker 镜像
  # ==========================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [sonarqube-analysis, sast-scan, dependency-check, unit-tests]
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        service: [backend, frontend, java]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Determine Dockerfile Path
        id: dockerfile
        run: |
          if [ "${{ matrix.service }}" == "java" ]; then
            echo "path=refactored-java" >> $GITHUB_OUTPUT
          else
            echo "path=${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.dockerfile.outputs.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ==========================================
  # 阶段 6: 容器镜像安全扫描
  # ==========================================
  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: build-images
    strategy:
      matrix:
        service: [backend, frontend, java]
    steps:
      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-image-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Run Snyk Container Scan
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          args: --severity-threshold=high --file=${{ matrix.service }}/Dockerfile

      - name: Upload Container Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: container-scan-${{ matrix.service }}
          path: trivy-image-${{ matrix.service }}.sarif

  # ==========================================
  # 阶段 7: 部署到开发环境
  # ==========================================
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build-images, container-scan]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: https://dev.robot-diagnosis.example.com
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.13.0'

      - name: Deploy to EKS (Development)
        run: |
          helm upgrade --install robot-diagnosis-dev ./devops/helm/robot-diagnosis-app \
            --namespace dev \
            --create-namespace \
            --set global.environment=dev \
            --set backend.image.tag=${{ github.sha }} \
            --set frontend.image.tag=${{ github.sha }} \
            --set javaService.image.tag=${{ github.sha }} \
            --set ingress.host=dev.robot-diagnosis.example.com \
            --wait --timeout 10m

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/backend -n dev
          kubectl rollout status deployment/frontend -n dev
          kubectl rollout status deployment/java-service -n dev

  # ==========================================
  # 阶段 8: 部署到测试环境 (带审批)
  # ==========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images, container-scan]
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.robot-diagnosis.example.com
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS (Staging)
        run: |
          helm upgrade --install robot-diagnosis-staging ./devops/helm/robot-diagnosis-app \
            --namespace staging \
            --create-namespace \
            --set global.environment=staging \
            --set backend.image.tag=${{ github.sha }} \
            --set frontend.image.tag=${{ github.sha }} \
            --set javaService.image.tag=${{ github.sha }} \
            --set ingress.host=staging.robot-diagnosis.example.com \
            --set replicaCount=2 \
            --wait --timeout 10m

      - name: Run Smoke Tests
        run: |
          curl -f https://staging.robot-diagnosis.example.com/health || exit 1

  # ==========================================
  # 阶段 9: DAST 安全测试
  # ==========================================
  dast-scan:
    name: DAST Security Scan
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.9.0
        with:
          target: 'https://staging.robot-diagnosis.example.com'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: report_*.html

  # ==========================================
  # 阶段 10: 灰度发布到生产环境
  # ==========================================
  deploy-production-canary:
    name: Canary Deployment to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging, dast-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://robot-diagnosis.example.com
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Canary Deployment (10% Traffic)
        run: |
          helm upgrade --install robot-diagnosis-prod ./devops/helm/robot-diagnosis-app \
            --namespace production \
            --create-namespace \
            --set global.environment=production \
            --set backend.image.tag=${{ github.ref_name }} \
            --set frontend.image.tag=${{ github.ref_name }} \
            --set javaService.image.tag=${{ github.ref_name }} \
            --set ingress.host=robot-diagnosis.example.com \
            --set canary.enabled=true \
            --set canary.weight=10 \
            --set replicaCount=3 \
            --wait --timeout 10m

      - name: Monitor Canary Metrics
        run: |
          echo "Monitoring canary deployment for 5 minutes..."
          sleep 300

      - name: Promote Canary (100% Traffic)
        run: |
          helm upgrade --install robot-diagnosis-prod ./devops/helm/robot-diagnosis-app \
            --namespace production \
            --set global.environment=production \
            --set backend.image.tag=${{ github.ref_name }} \
            --set frontend.image.tag=${{ github.ref_name }} \
            --set javaService.image.tag=${{ github.ref_name }} \
            --set ingress.host=robot-diagnosis.example.com \
            --set canary.enabled=false \
            --set replicaCount=5 \
            --wait --timeout 10m

      - name: Verify Production Deployment
        run: |
          kubectl rollout status deployment/backend -n production
          kubectl rollout status deployment/frontend -n production
          kubectl rollout status deployment/java-service -n production

  # ==========================================
  # 阶段 11: 生成部署报告
  # ==========================================
  generate-reports:
    name: Generate Deployment Reports
    runs-on: ubuntu-latest
    needs: [deploy-production-canary]
    if: always()
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate API Documentation
        run: |
          cd backend
          pip install -r requirements.txt
          # Generate OpenAPI spec
          python -c "from app.main import app; import json; from fastapi.openapi.utils import get_openapi; print(json.dumps(get_openapi(title='Robot Diagnosis API', version='1.0.0', routes=app.routes), indent=2))" > ../devops/docs/api/openapi.json

      - name: Upload API Documentation
        uses: actions/upload-artifact@v4
        with:
          name: api-documentation
          path: devops/docs/api/

      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always()
